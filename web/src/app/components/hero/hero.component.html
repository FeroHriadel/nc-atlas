<section class="hero-wrap">
    <div class="hero-text-wrap">
        <h3>HIDDEN GEMS · SLOVAKIA</h3>
        <h1>See the Slovakia the guidebooks skip</h1>
        <h2>A connoisseur's map of historic, rural and architectural sights — with routes and the stories behind them.</h2>
        <div class="buttons">
            <nc-button 
                width="200px" 
                class="orange-btn"
                [style]="{backgroundColor: 'var(--nc-orange-400)', color: 'var(--nc-white-900)'}"    
            >
                Explore Sights
                <nc-arrow-right-icon
                    [style]="{color: 'var(--nc-white-900)', transform: 'translateY(2px)'}"
                    class="flex flex-center gap-1"
                    [size]="14"
                ></nc-arrow-right-icon>
            </nc-button>
            <nc-button 
                width="200px"
                class="glass-btn"
                [style]="{backgroundColor: 'rgba(255, 255, 255, 0.1)', color: 'var(--nc-white-900)' }"
                variant="outline"
            >
                Plan a Trip
            </nc-button>
        </div>
    </div>
</section>
