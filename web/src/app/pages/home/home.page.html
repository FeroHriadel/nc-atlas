<app-hero></app-hero>
<app-about></app-about>

<section class="latest mb-12">
    <nc-card class="mb-4"></nc-card>
    <h2 class="section-title mb-6">Latest Sights</h2>
    <div class="latest-cards flex gap-6 flex-wrap justify-center">
        @for (sight of (latestSights$ | async) ?? []; track sight.id) {
            <app-sight-card [sight]="sight" />
        }
    </div>
</section>

<section class="gallery-preview mb-12">
    <nc-card class="mb-4"></nc-card>
    <h2 class="section-title mb-6">Gallery</h2>
    <div class="gallery-preview-cards">
        @for (image of latestGalleryImages(); track image.id) {
            <app-gallery-card [image]="image" (imageClick)="onGalleryImageClick($event)" />
        }
    </div>
</section>
