<nc-card class="sight-card">
    @if (thumbnailUrl(); as thumb) {
        <img class="sight-card-img" [src]="thumb" [alt]="sight()?.title" />
    }
    <div class="sight-card-body p-4">
        <h3 class="section-title-light sight-card-title" [innerHTML]="sight()?.title | highlight:searchTerm()"></h3>
        <span class="sight-card-category" [innerHTML]="sight()?.categoryName | highlight:searchTerm()"></span>
        @if (locationLabel()) {
            <span class="sight-card-location" [innerHTML]="locationLabel() | highlight:searchTerm()"></span>
        }
        <p class="text sight-card-description" [innerHTML]="sight()?.description | highlight:searchTerm()"></p>
        @if (visibleTags().length) {
            <div class="sight-card-tags">
                @for (tag of visibleTags(); track tag.id) {
                    <nc-pill size="small">{{ tag.name }}</nc-pill>
                }
            </div>
        }
        <a class="sight-card-btn" [routerLink]="['/sights', sight()?.id]">
            <nc-button size="small" variant="outline">Details</nc-button>
        </a>
    </div>
</nc-card>
